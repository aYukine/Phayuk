<!DOCTYPE html>
<html lang="en" class="bg-slate-50/50 scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHAYUK // Award Summary</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="text-slate-800 min-h-screen flex flex-col justify-between selection:bg-indigo-500 selection:text-white font-sans">

    <!-- Component Placeholders -->
    <div id="nav-wrapper"></div>

    <main class="max-w-4xl w-full mx-auto px-6 flex-grow py-12">
        <div id="award-detail-container" class="space-y-8 bg-white border border-slate-100 p-8 md:p-12 rounded-3xl shadow-sm">
            <!-- Loading Shell state -->
            <div class="animate-pulse flex space-x-4">
                <div class="flex-1 space-y-4 py-1">
                    <div class="h-4 bg-slate-200 rounded w-1/4"></div>
                    <div class="h-8 bg-slate-200 rounded"></div>
                    <div class="h-40 bg-slate-200 rounded"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-wrapper"></div>

    <!-- 1. External Array Script Source -->
    <script src="../data/awards.js"></script>

    <!-- 2. UI Component Scripts -->
    <script src="../components/NavBar.js"></script>
    <script src="../components/Footer.js"></script>

    <!-- 3. Dynamic Context Selector Engine -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById("award-detail-container");
            if (!container || typeof awardsData === "undefined") return;

            const urlParams = new URLSearchParams(window.location.search);
            const awardId = urlParams.get('id');

            // --- CONDITION A: NO ID PARAMETER -> SHOW FULL ARCHIVE LIST WITH IMAGES ---
            if (!awardId) {
                document.title = "PHAYUK // All Achievements";
                
                container.innerHTML = `
                    <div class="space-y-8">
                        <div class="border-b border-slate-100 pb-6">
                            <a href="../index.html" class="text-sm font-semibold text-indigo-600 hover:text-indigo-700">← Back to Home</a>
                            <h1 class="text-3xl font-black text-slate-900 tracking-tight mt-2">Complete Achievements & Milestones</h1>
                            <p class="text-slate-500 text-sm mt-1">A historical index of technical project validations and awards.</p>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-2">
                            ${awardsData.map(award => `
                                <div class="border border-slate-100 rounded-2xl overflow-hidden bg-white hover:shadow-md transition-all duration-200 flex flex-col justify-between">
                                    <div>
                                        <!-- Image preview container inside the main list archive -->
                                        <div class="aspect-video w-full bg-slate-50 border-b border-slate-100 overflow-hidden">
                                            <img src="${award.id}/${award.image}" alt="${award.title}" class="w-full h-full object-cover" loading="lazy">
                                        </div>
                                        <div class="p-6 space-y-2">
                                            <div class="flex justify-between items-center text-xs font-bold">
                                                <span class="text-indigo-600">${award.year}</span>
                                                <span class="text-slate-400">${award.organization}</span>
                                            </div>
                                            <h3 class="text-base font-bold text-slate-900 tracking-tight">${award.title}</h3>
                                            <p class="text-xs text-slate-500 leading-relaxed">${award.summary}</p>
                                        </div>
                                    </div>
                                    <div class="px-6 pb-6">
                                        <a href="index.html?id=${award.id}" class="text-xs font-bold text-indigo-600 hover:text-indigo-700 block pt-2">
                                            Inspect Deep Metrics →
                                        </a>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                return;
            }

            // --- CONDITION B: ID PARAMETER EXISTS -> SHOW SPECIFIC DETAIL CASE ---
            const award = awardsData.find(a => a.id === awardId);

            if (!award) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <h2 class="text-xl font-bold text-slate-900">Record Profile Not Found</h2>
                        <a href="index.html" class="text-indigo-600 hover:underline inline-block mt-4 text-sm font-semibold">← View All Awards</a>
                    </div>
                `;
                return;
            }

            document.title = `PHAYUK // ${award.title}`;

            container.innerHTML = `
                <div class="space-y-6">
                    <a href="index.html" class="text-sm font-semibold text-indigo-600 hover:text-indigo-700 transition-colors">← Back to All Awards</a>
                    
                    <div class="space-y-2">
                        <div class="flex items-center space-x-3 text-xs font-bold text-slate-400 uppercase tracking-wider">
                            <span>${award.organization}</span>
                            <span>•</span>
                            <span class="text-indigo-600">${award.year}</span>
                        </div>
                        <h1 class="text-2xl md:text-4xl font-black tracking-tight text-slate-900">${award.title}</h1>
                    </div>

                    <div class="border border-slate-100 rounded-2xl overflow-hidden shadow-sm bg-slate-50 max-w-xl mx-auto">
                        <img src="${award.id}/${award.image}" alt="${award.title}" class="w-full h-auto object-contain">
                    </div>

                    <div class="prose max-w-none text-slate-600 leading-relaxed pt-4 space-y-4">
                        <p class="text-lg font-medium text-slate-800">${award.summary}</p>
                        <p>${award.longDescription}</p>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
