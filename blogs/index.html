<!DOCTYPE html>
<html lang="en" class="bg-slate-50/50 scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Logs & Tech Itineraries | Pholl Chanphayuk</title>
    <meta name="description" content="Explore travel logs and regional tech competition diaries of Pholl Chanphayuk across China, Indonesia, Malaysia, Vietnam, and Cambodia.">
    <meta name="keywords" content="travel logs, tech competition diary, China travel, Indonesia travel, Vietnam Robocon, Pholl Chanphayuk">
    
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://phayuk.com/blogs/">
    <meta property="og:title" content="Travel Logs & Tech Itineraries | Pholl Chanphayuk">
    <meta property="og:description" content="Explore travel logs and regional tech competition diaries of Pholl Chanphayuk across China, Indonesia, Malaysia, Vietnam, and Cambodia.">
    <meta property="og:image" content="https://phayuk.com/assets/me.png">

    <!-- Tailwind CSS Engine Import -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="text-slate-800 min-h-screen flex flex-col justify-between selection:bg-indigo-500 selection:text-white font-sans">

    <!-- Reusable Shared Layout Components -->
    <div id="nav-wrapper"></div>

    <main class="max-w-6xl w-full mx-auto px-6 flex-grow py-12">
        <div class="space-y-8">
            
            <!-- Page Header Section -->
            <div class="border-b border-slate-100 pb-6">
                <a href="../index.html" class="text-sm font-semibold text-indigo-600 hover:text-indigo-700">← Back to Home</a>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight mt-2">Travel Logs & Regional Event Notes</h1>
                <p class="text-slate-500 text-sm mt-1">A visual archive capturing field operations and tech competition itineraries.</p>
            </div>
            
            <!-- Dynamic Blog Hub Grid -->
            <div id="blog-archive-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pt-2">
                <!-- Data Pipeline Injects Grid Cards Here -->
            </div>

        </div>
    </main>

    <div id="footer-wrapper"></div>

    <!-- Global Shared UI Layout Components (Stepping up one level to root) -->
    <script src="../components/NavBar.js"></script>
    <script src="../components/Footer.js"></script>

    <!-- Inline Blog Listing Engine Script -->
    <!-- Inline Blog Listing Engine Script -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const grid = document.getElementById("blog-archive-grid");
            if (!grid) return;

            // Simple static data map matching your workspace folder structure exactly
            const blogsData = [
                { id: "indonesia", destination: "Jakarta, Indonesia", context: "Regional Huawei ICT 2026 Competition" },
                { id: "china", destination: "Shenzhen, China", context: "Global Huawei ICT 2025 Competition" },
                { id: "malaysia", destination: "Kuala Lumpur, Malaysia", context: "Regional Huawei ICT 2025 Competition" },
                { id: "vietnam", destination: "Hanoi, Vietnam", context: "Robocon 2024 International Round" },
                { id: "my-hometown", destination: "My Cambodia life", context: "Me and my ordinary life" }
            ];

            // Render array mappings directly using template components as fully clickable anchors
            grid.innerHTML = blogsData.map(blog => `
                <a href="${blog.id}/index.html" class="group border border-slate-100 bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-md hover:border-slate-200 transition-all duration-200 flex flex-col justify-between cursor-pointer">
                    <div>
                        <!-- Natively targets and displays the 1st image from the country's local image path -->
                        <div class="aspect-video w-full bg-slate-50 border-b border-slate-100 overflow-hidden relative">
                            <img src="${blog.id}/img/1.png" alt="${blog.destination}" class="w-full h-full object-cover group-hover:scale-[1.02] transition-transform duration-300" loading="lazy" onerror="this.src='../assets/me.png'; this.classList.add('opacity-10','scale-75');">
                        </div>
                        <div class="p-6 space-y-2">
                            <span class="text-[10px] font-bold text-indigo-600 bg-indigo-50 border border-indigo-100/60 px-2.5 py-0.5 rounded-full uppercase tracking-wider">
                                Event Log
                            </span>
                            <h3 class="text-xl font-black text-slate-900 tracking-tight pt-1 group-hover:text-indigo-600 transition-colors duration-200">${blog.destination}</h3>
                            <p class="text-sm text-slate-500 leading-relaxed">${blog.context}</p>
                        </div>
                    </div>
                    <div class="px-6 pb-6">
                        <span class="text-xs font-bold text-indigo-600 group-hover:text-indigo-700 transition-colors inline-block pt-2">
                            Explore Gallery Logs →
                        </span>
                    </div>
                </a>
            `).join('');
        });
    </script>
</body>
</html>
