<!DOCTYPE html>
<html lang="en" class="bg-slate-50/50 scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHAYUK - Projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="text-slate-800 min-h-screen flex flex-col justify-between selection:bg-indigo-500 selection:text-white font-sans">

    <div id="nav-wrapper"></div>

    <main class="max-w-6xl w-full mx-auto px-6 flex-grow py-12">
        <div id="project-workspace-container" class="space-y-8">
            <div class="animate-pulse space-y-4 bg-white p-8 rounded-3xl border border-slate-100">
                <div class="h-4 bg-slate-200 rounded w-1/4"></div>
                <div class="h-8 bg-slate-200 rounded w-1/2"></div>
                <div class="grid grid-cols-1 sm:grid-cols-4 gap-4 pt-4">
                    <div class="h-48 bg-slate-200 rounded-xl"></div>
                    <div class="h-48 bg-slate-200 rounded-xl"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-wrapper"></div>
<!-- 1. Centralized Data Architecture Link -->
    <script src="../data/projects.js"></script>

    <!-- 2. Global Shared UI Components -->
    <script src="../components/NavBar.js"></script>
    <script src="../components/Footer.js"></script>

    <!-- 3. Dynamic Context & View Routing Engine -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById("project-workspace-container");
            if (!container || typeof projectsData === "undefined") return;

            // Intercept search string query index (?id=Blindsense)
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id');

            // --- CONDITION A: NO QUERY PARAMETER -> RENDER COMPLETE ARCHIVE GRID ---
            if (!projectId) {
                document.title = "PHAYUK - All Projects";
                
                container.innerHTML = `
                    <div class="space-y-8">
                        <div class="border-b border-slate-100 pb-6">
                            <a href="../index.html" class="text-sm font-semibold text-indigo-600 hover:text-indigo-700">← Back to Home</a>
                            <h1 class="text-3xl font-black text-slate-900 tracking-tight mt-2">Engineering Project Portfolio</h1>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-2">
                            ${projectsData.map(project => `
                                <div class="border border-slate-100 bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-all duration-200 flex flex-col justify-between">
                                    <div>
                                        <!-- Full cover snapshot preview loaded instantly inside grid lists -->
                                        <div class="aspect-video w-full bg-slate-50 border-b border-slate-100 overflow-hidden">
                                            <img src="${project.id}/${project.steps[0].img || 'img/1.png'}" alt="${project.title}" class="w-full h-full object-cover" loading="lazy">
                                        </div>
                                        <div class="p-6 space-y-2">
                                            <span class="text-[10px] font-bold text-indigo-600 bg-indigo-50 border border-indigo-100/60 px-2.5 py-0.5 rounded-full uppercase tracking-wider">
                                                System Build
                                            </span>
                                            <h3 class="text-xl font-bold text-slate-900 tracking-tight pt-1">${project.title}</h3>
                                            <p class="text-sm text-slate-500 leading-relaxed">${project.subtitle}</p>
                                        </div>
                                    </div>
                                    <div class="px-6 pb-6">
                                        <!-- Re-routes cleanly right into condition B via appending specific ID parameters -->
                                        <a href="index.html?id=${project.id}" class="text-xs font-bold text-indigo-600 hover:text-indigo-700 inline-block pt-2">
                                            View Details →
                                        </a>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                return;
            }

            // --- CONDITION B: SPECIFIC ID DETECTED -> RENDER THE 4-STAGE PIPELINE ---
            const project = projectsData.find(p => p.id === projectId);

            if (!project) {
                container.innerHTML = `
                    <div class="bg-white border border-slate-100 rounded-3xl p-12 text-center shadow-sm">
                        <h2 class="text-xl font-bold text-slate-900">Project Workspace Blank</h2>
                        <p class="text-sm text-slate-500 mt-2">The requested project data node could not be matched.</p>
                        <a href="index.html" class="text-indigo-600 hover:underline inline-block mt-4 text-sm font-semibold">← View All Projects</a>
                    </div>
                `;
                return;
            }

            document.title = `PHAYUK - ${project.title}`;

            container.innerHTML = `
                <div class="space-y-8">
                    <div class="border-b border-slate-100 pb-6">
                        <a href="index.html" class="text-sm font-semibold text-indigo-600 hover:text-indigo-700">← Back to All Projects</a>
                        <h1 class="text-3xl md:text-4xl font-black text-slate-900 tracking-tight mt-2">${project.title}</h1>
                        <p class="text-slate-500 text-sm md:text-base mt-1">${project.subtitle}</p>
                    </div>
                    
                    <!-- Clean 4-Column Flow Pipeline Gallery -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        ${project.steps.map(step => `
                            <div class="bg-white border border-slate-100 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-all p-3 space-y-3 flex flex-col justify-between">
                                <div>
                                    <div class="aspect-square bg-slate-50 rounded-xl overflow-hidden border border-slate-100">
                                        <!-- Pointing relative to local project directory structure cleanly -->
                                        ${step.img ? 
                                            `<img src="${project.id}/${step.img}" alt="${step.label}" class="w-full h-full object-cover">` :
                                            `<div class="w-full h-full flex items-center justify-center text-slate-300 font-mono text-xs">[ Missing Image ]</div>`
                                        }
                                    </div>
                                    <div class="px-1 pt-3">
                                        <span class="text-[10px] font-bold text-indigo-600 font-mono tracking-wider block">${step.num} - ${step.label}</span>
                                        <p class="text-xs text-slate-600 font-medium mt-1.5 leading-relaxed">${step.desc}</p>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
